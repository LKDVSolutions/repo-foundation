# DOC_REGISTRY.yaml
# Canonical documentation registry for [YOUR-PROJECT-NAME].
# Authority: current_config (maintained by agents and humans)
# DO NOT edit the generated DOC_REGISTRY.md directly — update this YAML and regenerate.
#
# Schema version: 1.0
#
# Field reference:
#   doc_id:             Unique identifier (snake_case, typically mirrors filename)
#   path:               Path relative to repo root
#   doc_class:          entrypoint | active | generated | historical
#   authority_kind:     plan | blueprint | guide | current_config | runtime_evidence | null
#   title:              Human-readable title
#   primary_audience:   agents | humans | both
#   task_entry_for:     Task classes this doc is a primary entry point for (list)
#   read_sequence:      Per task class, ordered list of doc_ids to read next (map)
#   system_owner:       Which system/subsystem owns this doc
#   doc_owner:          Person responsible for this doc
#   updated_by:         human | agent
#   authoritative_for:  List of fact classes this doc owns (empty list [] if none)
#   source_inputs:      Source artifacts this doc is derived from (null if not derived)
#   refresh_policy:     manual | on_source_change | scheduled
#   verification_level: none | repo_derived | ssh_verified
#   last_verified:      ISO date of last verification (YYYY-MM-DD), null if never verified
#   evidence_refs:      Links or descriptions of verification evidence (null if none)
#   supersedes:         doc_id this entry replaces (null if none)
#   superseded_by:      doc_id that replaces this entry (null if none)
#   status:             active | historical
#   notes:              Free-text notes

entries:

  # ─── Entrypoints ───────────────────────────────────────────────────────────

  - doc_id: INDEX_md
    path: docs/INDEX.md
    doc_class: entrypoint
    authority_kind: null
    title: "[YOUR-PROJECT-NAME] — Repository Index"
    primary_audience: both
    task_entry_for:
      - implement_change
      - investigate_runtime_issue
      - refresh_current_docs
      - update_plan_or_roadmap
      - operate_or_release
      - test_or_operate_dev_environment
    read_sequence:
      - implement_change: [CLAUDE_md]
      - investigate_runtime_issue: [AGENT_WORKFLOW_md, CLAUDE_md]
      - refresh_current_docs: [DOC_REGISTRY_YAML, REFERENCE_md]
      - update_plan_or_roadmap: []
      - operate_or_release: [CLAUDE_md]
      - test_or_operate_dev_environment: []
    system_owner: system-wide
    doc_owner: "[YOUR-NAME]"
    updated_by: human
    authoritative_for: []
    source_inputs: null
    refresh_policy: manual
    verification_level: none
    last_verified: null
    evidence_refs: null
    supersedes: null
    superseded_by: null
    status: active
    notes: >
      Universal repo entrypoint. Navigation only — no mutable facts.
      All task classes route through this doc first.

  # ─── Active docs: guides ───────────────────────────────────────────────────

  - doc_id: REFERENCE_md
    path: docs/REFERENCE.md
    doc_class: active
    authority_kind: guide
    title: "[YOUR-PROJECT-NAME] — Where Is the Truth?"
    primary_audience: both
    task_entry_for: null
    read_sequence: null
    system_owner: system-wide
    doc_owner: "[YOUR-NAME]"
    updated_by: human
    authoritative_for:
      - authority surface map (which source owns each class of fact)
      - resolution chains for known conflicts
    source_inputs: null
    refresh_policy: manual
    verification_level: none
    last_verified: null
    evidence_refs: null
    supersedes: null
    superseded_by: null
    status: active
    notes: >
      Where-is-the-truth map. Update when new current_config or runtime_evidence
      surfaces are added, or when a known transitional state is resolved.

  - doc_id: AGENT_WORKFLOW_md
