# Agent Configuration
agent:
  name: "project-agent"
  version: "1.0.0"
  default_model: "gemini-1.5-pro"
  max_iterations: 25
  memory_scope: "project"
  capabilities:
    - shell_execution
    - file_system_access
    - codebase_search
  allowed_tools:
    - write_file
    - read_file
    - run_shell_command
    - replace
    - grep_search
    - glob
  restrictions:
    - "Never log, print, or commit secrets, API keys, or sensitive credentials."
    - "Do not stage or commit changes unless specifically requested."
  observability:
    state_file: "docs/history/AGENT_STATE.md"
    decision_log: "docs/history/DECISION_LOG.md"

template:
  version: "1.1.0"
  last_migrated: "2026-04-24T00:00:00Z"
  changelog_ref: "docs/reference/TEMPLATE_CHANGELOG.md"

governance:
  # Staleness TTL thresholds per authority_kind.
  # warn_days: emit [WARN] — doc is potentially stale
  # fail_days: emit [FAIL] and exit 1 — doc must be re-verified before merging
  staleness_ttl:
    runtime_evidence:
      warn_days: 7
      fail_days: 30
    current_config:
      warn_days: 30
      fail_days: 90
  # Maximum concurrent agents supported by the file-based registry (FileLock RMW model).
  # Exceeding this ceiling risks lock contention timeouts. See ENGINEERING_STANDARDS.md.
  max_concurrent_agents: 10
